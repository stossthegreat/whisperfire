name: Android Debug APK (Flutter)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter pub get
        run: flutter pub get

      # 👇 PATCH: Fix google_mlkit_smart_reply manifest crash on AGP 8
      - name: Patch ML Kit Smart Reply manifest for AGP 8
        run: |
          FILE="$HOME/.pub-cache/hosted/pub.dev/google_mlkit_smart_reply-0.9.0/android/src/main/AndroidManifest.xml"
          if [ -f "$FILE" ]; then
            sed -i 's/\s*package="com.google_mlkit_smart_reply"//' "$FILE"
            echo "Patched: $FILE"
          else
            echo "Smart Reply manifest not found at $FILE"
          fi

      - name: Flutter analyze (non-blocking)
        run: flutter analyze || true

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Clean
        run: flutter clean

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
